<!doctype html>
<html lang="en">
    <head>
        <script>
            // Apply saved theme immediately to prevent flash
            (function () {
                var t = localStorage.getItem('dpsi_theme');
                if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            })();
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DPSI Menu Voting</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/auth.css" />
    </head>
    <body class="auth-page">
        <!-- Animated background -->
        <div class="bg-canvas">
            <div class="bg-orb orb-1"></div>
            <div class="bg-orb orb-2"></div>
            <div class="bg-orb orb-3"></div>
            <div class="bg-grid"></div>
        </div>

        <!-- Auth Container -->
        <div class="auth-wrapper">
            <!-- Logo -->
            <div class="auth-logo">
                <img
                    src="assets/logo.png"
                    alt="DPSI"
                    id="school-logo"
                    onerror="
                        this.style.display = 'none';
                        document.getElementById('logo-text').style.display = 'block';
                    "
                />
                <div id="logo-text" class="logo-text-fallback" style="display: none">
                    <span class="logo-dps">DPS</span><span class="logo-iedge">i·Edge</span>
                </div>
            </div>

            <!-- Step 1: Email Entry -->
            <div class="auth-card glass-card" id="step-email">
                <div class="auth-card-header">
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle">Sign in to vote for your weekly menu</p>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email-input">School Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input
                            type="email"
                            id="email-input"
                            class="form-input"
                            placeholder="firstname.lastnameID@school.edu.in"
                            autocomplete="email"
                        />
                    </div>
                    <span class="form-error" id="email-error"></span>
                </div>
                <button class="btn btn-primary btn-full" id="email-next-btn">
                    <span>Continue</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <!-- Step 2a: First Login - Set Password -->
            <div class="auth-card glass-card" id="step-first-login" style="display: none">
                <div class="auth-card-header">
                    <button class="back-btn" id="back-from-first">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <h1 class="auth-title">First Time Here?</h1>
                    <p class="auth-subtitle">Enter your temporary password, then create a new one</p>
                </div>
                <div class="form-group">
                    <label class="form-label">Temporary Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="temp-password-input"
                            class="form-input"
                            placeholder="Firstname@ddmmyy"
                            autocomplete="current-password"
                        />
                        <button class="toggle-pw" data-target="temp-password-input">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <span class="form-error" id="temp-pw-error"></span>
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="new-password-input"
                            class="form-input"
                            placeholder="At least 6 characters"
                            autocomplete="new-password"
                        />
                        <button class="toggle-pw" data-target="new-password-input">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <span class="form-error" id="new-pw-error"></span>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="confirm-password-input"
                            class="form-input"
                            placeholder="Repeat new password"
                            autocomplete="new-password"
                        />
                        <button class="toggle-pw" data-target="confirm-password-input">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <span class="form-error" id="confirm-pw-error"></span>
                </div>
                <button class="btn btn-primary btn-full" id="first-login-btn">
                    <span>Set Password & Enter</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <!-- Step 2b: Normal Login -->
            <div class="auth-card glass-card" id="step-login" style="display: none">
                <div class="auth-card-header">
                    <button class="back-btn" id="back-from-login">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle" id="login-name-label">Enter your password to continue</p>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="login-password-input"
                            class="form-input"
                            placeholder="Your password"
                            autocomplete="current-password"
                        />
                        <button class="toggle-pw" data-target="login-password-input">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <span class="form-error" id="login-pw-error"></span>
                </div>
                <button class="btn btn-primary btn-full" id="login-btn">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <!-- Step 2c: Admin Login -->
            <div class="auth-card glass-card" id="step-admin-login" style="display: none">
                <div class="auth-card-header">
                    <button class="back-btn" id="back-from-admin">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <h1 class="auth-title">Admin Access</h1>
                    <p class="auth-subtitle">Restricted area — authorised personnel only</p>
                </div>
                <div class="form-group">
                    <label class="form-label">Admin Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="admin-password-input"
                            class="form-input"
                            placeholder="Admin password"
                            autocomplete="current-password"
                        />
                        <button class="toggle-pw" data-target="admin-password-input">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <span class="form-error" id="admin-pw-error"></span>
                </div>
                <button class="btn btn-primary btn-full" id="admin-login-btn">
                    <span>Access Dashboard</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <div class="auth-footer">
                <p>DPSI · Menu Voting System</p>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loading-overlay" style="display: none">
            <div class="loading-spinner"></div>
            <p class="loading-text" id="loading-text">Please wait…</p>
        </div>

        <!-- Dark mode toggle (bottom-right) -->
        <button
            class="dark-toggle"
            id="dark-toggle"
            title="Toggle dark mode"
            style="position: fixed; bottom: 20px; right: 20px; z-index: 500"
        >
            <i class="fa-solid fa-moon" id="dark-toggle-icon"></i>
        </button>

        <script>
            (function () {
                const saved = localStorage.getItem('dpsi_theme');
                const btn = document.getElementById('dark-toggle');
                const icon = document.getElementById('dark-toggle-icon');
                function applyTheme(dark) {
                    document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
                    icon.className = dark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
                }
                applyTheme(saved === 'dark');
                btn.addEventListener('click', function () {
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    const next = !isDark;
                    localStorage.setItem('dpsi_theme', next ? 'dark' : 'light');
                    applyTheme(next);
                });
            })();
        </script>

        <script src="js/config.js"></script>
        <script src="js/supabase.js"></script>
        <script src="js/crypto.js"></script>
        <script src="js/auth.js"></script>
    </body>
</html>
