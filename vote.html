<!doctype html>
<html lang="en">
    <head>
        <script>
            // Apply saved theme immediately to prevent flash
            (function () {
                var t = localStorage.getItem('dpsi_theme');
                if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            })();
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DPSI · Menu Voting</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/vote.css" />
    </head>
    <body class="app-page">
        <!-- Top Navigation Banner -->
        <header class="app-header glass-nav">
            <div class="header-inner">
                <div class="header-left">
                    <img src="assets/logo.png" alt="DPSI Logo" class="nav-logo" />
                    <div class="user-greeting">
                        <h2 class="greeting-name" id="user-name">Student</h2>
                    </div>
                </div>
                <div class="header-center">
                    <div class="week-badge" id="week-badge">
                        <i class="fa-solid fa-calendar-days"></i>
                        <span id="week-label">Week not set</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="menu-summary-btn" id="show-menu-summary-btn">
                        <i class="fa-solid fa-table-list"></i>
                        <span>My Menu</span>
                    </button>
                    <button class="dark-toggle" id="dark-toggle" title="Toggle dark mode">
                        <i class="fa-solid fa-moon" id="dark-toggle-icon"></i>
                    </button>
                    <button class="btn btn-ghost icon-btn" id="logout-btn" title="Sign out">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Voting Closed — Full-screen centred callout -->
        <div class="voting-closed-screen" id="voting-closed-screen" style="display: none">
            <div class="voting-closed-callout">
                <div class="closed-callout-icon">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <h2 class="closed-callout-title">Voting is Closed</h2>
                <p class="closed-callout-desc">
                    The admin has closed voting for this week. Check back soon — voting will reopen when next week's
                    menu options are ready.
                </p>
                <div class="closed-callout-badge">
                    <i class="fa-solid fa-circle-info"></i>
                    Currently closed
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="app-main" id="voting-main">
            <!-- Day Selector -->
            <div class="day-selector-wrap">
                <div class="day-selector" id="day-selector">
                    <button class="day-btn active" data-day="monday">
                        <span class="day-short">Mon</span>
                        <span class="day-full">Monday</span>
                        <span class="day-voted-dot" id="dot-monday"></span>
                    </button>
                    <button class="day-btn" data-day="tuesday">
                        <span class="day-short">Tue</span>
                        <span class="day-full">Tuesday</span>
                        <span class="day-voted-dot" id="dot-tuesday"></span>
                    </button>
                    <button class="day-btn" data-day="wednesday">
                        <span class="day-short">Wed</span>
                        <span class="day-full">Wednesday</span>
                        <span class="day-voted-dot" id="dot-wednesday"></span>
                    </button>
                    <button class="day-btn" data-day="thursday">
                        <span class="day-short">Thu</span>
                        <span class="day-full">Thursday</span>
                        <span class="day-voted-dot" id="dot-thursday"></span>
                    </button>
                    <button class="day-btn" data-day="friday">
                        <span class="day-short">Fri</span>
                        <span class="day-full">Friday</span>
                        <span class="day-voted-dot" id="dot-friday"></span>
                    </button>
                </div>
            </div>

            <!-- Star limit info -->
            <div class="star-info-bar" id="star-info-bar">
                <i class="fa-solid fa-star"></i>
                <span id="star-info-text">You can pick <strong>1 star item</strong> today</span>
                <span class="star-used-badge" id="star-used-badge">0 / 1 used</span>
            </div>

            <!-- Fixed item notice -->
            <div class="fixed-item-notice" id="fixed-item-notice" style="display: none">
                <i class="fa-solid fa-shield-halved"></i>
                <span id="fixed-item-text"></span>
            </div>

            <!-- Meal Sections -->
            <div class="meal-sections" id="meal-sections">
                <!-- Sections rendered by JS -->
            </div>
        </main>

        <!-- Menu Summary Modal -->
        <div class="modal-overlay menu-summary-modal" id="menu-summary-modal" style="display: none">
            <div class="modal glass-card">
                <div class="modal-header">
                    <h2>Weekly Menu Summary</h2>
                    <button class="modal-close" id="menu-summary-close">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="summary-tabs" id="summary-tabs">
                        <div class="summary-tabs-header">
                            <button class="summary-tab active" data-tab="my">Your Selections</button>
                        </div>
                        <div class="summary-table-widgets" style="margin-top: 12px">
                            <div class="summary-table-wrap active" data-table="my">
                                <table class="summary-table" id="my-selections-table">
                                    <thead></thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div class="toast" id="toast">
            <span class="toast-icon"><i class="fa-solid fa-circle-check"></i></span>
            <span class="toast-msg" id="toast-msg">Votes saved!</span>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loading-overlay" style="display: none">
            <div class="loading-spinner"></div>
            <p class="loading-text" id="loading-text">Loading…</p>
        </div>

        <script>
            // Dark mode
            (function () {
                var saved = localStorage.getItem('dpsi_theme');
                var btn = document.getElementById('dark-toggle');
                var icon = document.getElementById('dark-toggle-icon');
                function applyTheme(dark) {
                    document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
                    icon.className = dark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
                }
                applyTheme(saved === 'dark');
                btn.addEventListener('click', function () {
                    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    var next = !isDark;
                    localStorage.setItem('dpsi_theme', next ? 'dark' : 'light');
                    applyTheme(next);
                });
            })();
            // Menu summary modal
            (function () {
                var modal = document.getElementById('menu-summary-modal');
                var showBtn = document.getElementById('show-menu-summary-btn');
                if (!modal || !showBtn) return;
                showBtn.addEventListener('click', function () {
                    modal.style.display = 'flex';
                });
                function closeModal() {
                    modal.style.display = 'none';
                }
                document.getElementById('menu-summary-close').addEventListener('click', closeModal);
                modal.addEventListener('click', function (e) {
                    if (e.target === modal) closeModal();
                });
            })();
        </script>
        <script src="js/config.js"></script>
        <script src="js/supabase.js"></script>
        <script src="js/crypto.js"></script>
        <script src="js/cache.js"></script>
        <script src="js/vote.js"></script>
    </body>
</html>
